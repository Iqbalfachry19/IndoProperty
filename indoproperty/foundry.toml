[profile.default]
src = "src"
out = "out"
libs = ["lib", "node_modules"]
test = "test"
script = "script"
solc_version = "0.8.20"
via_ir = true
optimizer = true
optimizer_runs = 200
remappings = ["@openzeppelin/=lib/openzeppelin-contracts/"]
fuzz = { runs = 256 }

[rpc_endpoints]
mainnet = "${MAINNET_RPC_URL}"
sepolia = "${SEPOLIA_RPC_URL}"

[etherscan]
mainnet = { key = "${ETHERSCAN_API_KEY}" }
sepolia = { key = "${ETHERSCAN_API_KEY}", chain = 11155111 }
